version: "3.8"

services:
  oracle-db:
    image: gvenzl/oracle-free:latest
    container_name: oracle-db
    ports:
      - "1521:1521"
    environment:
      ORACLE_PASSWORD: YourPassword123
      APP_USER: UCENTER_USER
      APP_USER_PASSWORD: UCenterPassword123
    volumes:
      - ./db/init.sql:/container-entrypoint-initdb.d/init.sql
    restart: always

  web:
    build: .
    container_name: flask-app
    ports:
      - "5000:5000"
    depends_on:
      - oracle-db
    restart: always